# POSManual - DevSys Honduras
# GitHub Actions: CI/CD Pipeline
# Archivo: .github/workflows/ci.yml
#
# Se ejecuta en cada push a main y en pull requests.
# Corre las pruebas y verifica el build antes del deploy.

name: CI — POSManual

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── JOB 1: Pruebas del backend ──────────────────────────────
  test-backend:
    name: Backend — Jest + Supertest
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER:     posmanual
          POSTGRES_PASSWORD: test_password
          POSTGRES_DB:       posmanual_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: server/package-lock.json

      - name: Instalar dependencias del servidor
        run: cd server && npm ci

      - name: Aplicar schema y seed de prueba
        env:
          PGPASSWORD: test_password
        run: |
          psql -h localhost -U posmanual -d posmanual_test -f 01_schema.sql
          psql -h localhost -U posmanual -d posmanual_test -f 02_seed.sql

      - name: Ejecutar pruebas de integración
        env:
          DATABASE_URL: postgresql://posmanual:test_password@localhost:5432/posmanual_test
          JWT_SECRET:   ci_test_secret_posmanual_64_chars_no_usar_produccion_ok
          JWT_EXPIRES_IN: 1h
          NODE_ENV:     test
          PORT:         3001
        run: cd server && npm test -- --coverage

      - name: Subir reporte de cobertura
        uses: codecov/codecov-action@v4
        if: always()
        with:
          directory: server/coverage
          flags: backend

  # ── JOB 2: Pruebas del frontend ─────────────────────────────
  test-frontend:
    name: Frontend — Vitest
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: client/package-lock.json

      - name: Instalar dependencias del cliente
        run: cd client && npm ci

      - name: Ejecutar pruebas unitarias
        run: cd client && npx vitest run --coverage

      - name: Subir reporte de cobertura
        uses: codecov/codecov-action@v4
        if: always()
        with:
          directory: client/coverage
          flags: frontend

  # ── JOB 3: Build de producción ──────────────────────────────
  build:
    name: Build React — producción
    runs-on: ubuntu-latest
    needs: [test-frontend]  # solo si pasan las pruebas

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: client/package-lock.json

      - name: Instalar dependencias
        run: cd client && npm ci

      - name: Build de producción
        env:
          VITE_API_URL: https://posmanual.up.railway.app/api/v1
        run: cd client && npm run build

      - name: Verificar que dist/ existe
        run: |
          test -d client/dist
          test -f client/dist/index.html
          echo "Build exitoso. Tamaño:"
          du -sh client/dist/

      - name: Guardar artefacto del build
        uses: actions/upload-artifact@v4
        with:
          name: client-dist
          path: client/dist/
          retention-days: 1

  # ── JOB 4: Notificación de éxito ────────────────────────────
  notify:
    name: Notificar resultado
    runs-on: ubuntu-latest
    needs: [test-backend, test-frontend, build]
    if: always()

    steps:
      - name: Estado del pipeline
        run: |
          if [ "${{ needs.test-backend.result }}" == "success" ] && \
             [ "${{ needs.test-frontend.result }}" == "success" ] && \
             [ "${{ needs.build.result }}" == "success" ]; then
            echo "✅ Todos los checks pasaron — Railway hará el deploy automáticamente"
          else
            echo "❌ Algunos checks fallaron — revisar antes del deploy"
            exit 1
          fi
